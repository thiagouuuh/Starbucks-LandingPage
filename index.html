<!DOCTYPE html>
<html lang="pt-br">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="hulk"></div>

    <img src="./IMGG/STar.png" alt="logo Starbucks" class="logo">


    <div class="conteudo">
        <div class="texto">
            <h2>Não é apenas Café, é um <span>Starbucks</span></h2>
            <p>Vai deixar passar?</p>
            <button>Compre aqui!</button>
        </div>

        <div class="imagem">
            <img src="./IMGG/img1.png" alt="Copo Starbucks" class="copao">
        </div>
    </div>

    <div class="copinhos">
        <img src="./IMGG/img-pequena1.png" class="copin verde">
        <img src="./IMGG/img-pequena2.png" class="copin amarelo">
        <img src="./IMGG/img-pequena3.png" class="copin rosa">
    </div>


</body>

<script>
    let circulo = document.querySelector(".hulk")
    let imgCOPO = document.querySelector(".copao")
    let verde = document.querySelector(".verde")
    let amarelo = document.querySelector(".amarelo")
    let rosa = document.querySelector(".rosa")

    amarelo.addEventListener("click", () => {
        imgCOPO.src = "./IMGG/img2.png"
        circulo.style.background = "#eb7495"
    })

    verde.addEventListener("click", () => {
        imgCOPO.src = "./IMGG/img1.png"
        circulo.style.background = "#017143"
    })

    rosa.addEventListener("click", () => {
        imgCOPO.src = "./IMGG/img3.png"
        circulo.style.background = "#d752b1"
    })

</script>

</html>
